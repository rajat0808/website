<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands | Sindh Emporio</title>
    <meta name="description" content="Explore the curated luxury brands at Sindh Emporio in Lucknow.">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#f4efea">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Bodoni+Moda:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="brand-page">
    <header class="header">
        <div class="header-container">
            <a class="logo" href="index.html" aria-label="Sindh Emporio home">
                <img src="assets/sindh-emporio-logo.png" alt="Sindh Emporio">
            </a>
            <nav class="main-nav" aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html#top">HOME</a></li>
                    <li><a href="brand.html">BRAND</a></li>
                    <li><a href="index.html#events">EVENT</a></li>
                </ul>
            </nav>
            <button
                class="menu-trigger"
                id="menuTrigger"
                type="button"
                aria-label="Open menu"
                aria-expanded="false"
                aria-controls="menuPanel"
            >
                <span class="menu-text">MENU</span>
                <span class="menu-lines" aria-hidden="true">
                    <span></span>
                    <span></span>
                </span>
            </button>
        </div>
        <nav class="menu-panel" id="menuPanel" aria-label="Menu panel" hidden>
            <div class="menu-layout">
                <div class="menu-content">
                    <div class="menu-columns">
                        <div class="menu-heading">
                            <span class="menu-title">Explore</span>
                            <span class="menu-rule" aria-hidden="true"></span>
                        </div>
                        <ul class="menu-panel-links">
                            <li><a href="index.html#top">Home</a></li>
                            <li><a href="brand.html">Brand</a></li>
                            <li><a href="index.html#events">Event</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="brand-main">
        <section class="brand-hero">
            <div class="brand-hero-media" aria-hidden="true">
                <img class="brand-hero-slide" style="--slide: 0" src="assets/brand-slide-01.png" alt="">
                <img class="brand-hero-slide" style="--slide: 1" src="assets/brand-slide-02.png" alt="">
                <img class="brand-hero-slide" style="--slide: 2" src="assets/brand-slide-03.png" alt="">
                <img class="brand-hero-slide" style="--slide: 3" src="assets/brand-slide-04.png" alt="">
                <img class="brand-hero-slide" style="--slide: 4" src="assets/brand-slide-05.png" alt="">
            </div>
        </section>

        <section class="luxury-showcase" aria-labelledby="luxury-showcase-title">
            <div class="luxury-showcase__inner">
                <header class="luxury-showcase__header">
                    <h2 id="luxury-showcase-title" class="luxury-showcase__title">Sindh Emporio</h2>
                </header>

                <div class="luxury-grid">
                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/logo-armani-exchange.png" alt="Armani Exchange logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Armani Exchange</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Armani Exchange">Show More</a>
                        </div>
                    </article>

                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/superdry-logo.png" alt="Superdry logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Superdry</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Superdry">Show More</a>
                        </div>
                    </article>

                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/logo-lacoste.png" alt="Lacoste logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Lacoste</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Lacoste">Show More</a>
                        </div>
                    </article>

                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/logo-basanti.png" alt="Basanti logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Basanti</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Basanti">Show More</a>
                        </div>
                    </article>

                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/logo-kora.png" alt="Kora logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Kora</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Kora">Show More</a>
                        </div>
                    </article>

                    <article class="luxury-card">
                        <div class="luxury-card__image">
                            <img src="assets/logo-sindh-emporio.png" alt="Sindh Emporio logo" loading="lazy">
                        </div>
                        <div class="luxury-card__meta">
                            <h3 class="luxury-card__name">Sindh Emporio</h3>
                            <a class="luxury-card__cta" href="#" aria-label="Show more about Sindh Emporio">Show More</a>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <script>
        (function () {
            var menuTrigger = document.getElementById("menuTrigger");
            var menuPanel = document.getElementById("menuPanel");

            if (!menuTrigger || !menuPanel) {
                return;
            }

            function openMenu() {
                menuPanel.hidden = false;
                menuTrigger.setAttribute("aria-expanded", "true");
                menuTrigger.setAttribute("aria-label", "Close menu");
                document.body.classList.add("menu-open");
            }

            function closeMenu() {
                menuPanel.hidden = true;
                menuTrigger.setAttribute("aria-expanded", "false");
                menuTrigger.setAttribute("aria-label", "Open menu");
                document.body.classList.remove("menu-open");
            }

            menuTrigger.addEventListener("click", function () {
                var isExpanded = menuTrigger.getAttribute("aria-expanded") === "true";
                if (isExpanded) {
                    closeMenu();
                    return;
                }
                openMenu();
            });

            document.addEventListener("click", function (event) {
                var target = event.target;
                if (menuPanel.hidden) {
                    return;
                }
                if (menuPanel.contains(target) || menuTrigger.contains(target)) {
                    return;
                }
                closeMenu();
            });

            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape") {
                    closeMenu();
                }
            });

            Array.prototype.forEach.call(menuPanel.querySelectorAll("a"), function (link) {
                link.addEventListener("click", closeMenu);
            });
        })();
    </script>
</body>
</html>
